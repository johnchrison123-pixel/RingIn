<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090E" />
    <meta
      name="description"
      content="RingIn — connect, message, and call experts in real time."
    />

    <!-- ── PWA / Apple home-screen app meta ──────────────────────────────────
         These let RingIn install to the iOS home screen and run full-screen
         (no Safari chrome) when launched from the icon, exactly matching the
         current web behavior. Android picks up everything it needs from
         manifest.json — these tags are purely for iOS Safari. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RingIn" />
    <meta name="application-name" content="RingIn" />
    <meta name="msapplication-TileColor" content="#09090E" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>RingIn</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- ── Early PWA install-prompt capture ─────────────────────────────
         Chromium can fire `beforeinstallprompt` BEFORE React mounts (the
         event fires the moment the SW activates + engagement heuristics
         trigger, which on a fast device can beat React's hydration). If
         our React listener isn't attached yet, the event is lost forever
         and we never get a chance to show the install pill. This tiny
         script attaches a listener at HTML parse time so we can't miss
         it, then stashes the event on window for the React component
         to pick up. -->
    <script>
      (function () {
        try {
          window.__ringinDeferredInstall = null;
          window.addEventListener('beforeinstallprompt', function (e) {
            try { e.preventDefault(); } catch (_) {}
            window.__ringinDeferredInstall = e;
            // Notify React in case the component is already mounted
            try { window.dispatchEvent(new Event('ringin-install-ready')); } catch (_) {}
          });
          window.addEventListener('appinstalled', function () {
            window.__ringinDeferredInstall = null;
            try { window.dispatchEvent(new Event('ringin-install-done')); } catch (_) {}
          });
        } catch (e) { /* never break the page */ }
      })();
    </script>
    <!-- Mobile debug console (Eruda). Loads only when URL has ?debug=1
         Open ring-in.vercel.app/?debug=1 to enable.  Tap the floating button on screen,
         then go to the Console tab — you'll see all [ringin] logs right on your phone. -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          if (p.get('debug') === '1' || localStorage.getItem('ringin_debug') === '1') {
            localStorage.setItem('ringin_debug', '1');
            var s = document.createElement('script');
            s.src = '//cdn.jsdelivr.net/npm/eruda';
            s.onload = function () { try { window.eruda && window.eruda.init(); } catch (e) {} };
            document.body.appendChild(s);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
