<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090E" />
    <meta name="description" content="RingIn — connect, message, and call experts in real time. Pay-per-minute audio consultations. No ads, no algorithm, just real conversations." />
    <link rel="canonical" href="https://ring-in.vercel.app/" />

    <!-- ── OpenGraph (Facebook / LinkedIn / WhatsApp / Slack / Discord / iMessage) ──
         These render the link preview when a RingIn URL is shared. Every
         non-Google crawler in this list (facebookexternalhit, Twitterbot,
         LinkedInBot, Slackbot, Discordbot, WhatsApp's fetcher) does NOT
         execute JavaScript — without these tags the preview is empty.
         For per-PAGE meta (specific user / specific post), the Vercel
         middleware at /middleware.js detects the crawler UA and rewrites
         to /api/preview which serves enriched HTML with page-specific tags. -->
    <meta property="og:site_name" content="RingIn" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ring-in.vercel.app/" />
    <meta property="og:title" content="RingIn — talk to experts, by the minute" />
    <meta property="og:description" content="Connect, message, and call experts in real time. Pay-per-minute audio consultations. No ads, no algorithm — just real conversations." />
    <meta property="og:image" content="https://ring-in.vercel.app/logo512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card — falls back to og:* but having explicit twitter:* avoids
         the rare cases where X's parser ignores OG. summary_large_image is
         the modern hero card layout. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RingIn — talk to experts, by the minute" />
    <meta name="twitter:description" content="Connect, message, and call experts in real time. Pay-per-minute audio consultations." />
    <meta name="twitter:image" content="https://ring-in.vercel.app/logo512.png" />

    <!-- ── schema.org / JSON-LD structured data ──
         Drives Google's rich SERP results (knowledge-panel-style) and is
         indexable by every major search engine. Per-PAGE Person / Article
         schema is injected by the crawler-aware middleware for /profile/<id>
         and /post/<id> — this block is the org-level baseline.
         BreadcrumbList omitted at root (no breadcrumbs to root). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://ring-in.vercel.app/#organization",
          "name": "RingIn",
          "url": "https://ring-in.vercel.app/",
          "logo": "https://ring-in.vercel.app/logo512.png",
          "description": "Pay-per-minute audio consultations with experts.",
          "sameAs": [
            "https://github.com/johnchrison123-pixel/RingIn"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://ring-in.vercel.app/#website",
          "url": "https://ring-in.vercel.app/",
          "name": "RingIn",
          "publisher": { "@id": "https://ring-in.vercel.app/#organization" },
          "inLanguage": "en-US"
        }
      ]
    }
    </script>

    <!-- ── PWA / Apple home-screen app meta ──────────────────────────────────
         These let RingIn install to the iOS home screen and run full-screen
         (no Safari chrome) when launched from the icon, exactly matching the
         current web behavior. Android picks up everything it needs from
         manifest.json — these tags are purely for iOS Safari. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RingIn" />
    <meta name="application-name" content="RingIn" />
    <meta name="msapplication-TileColor" content="#09090E" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>RingIn</title>
    <style>
      /* Dark page background prevents the WHITE FLASH between bundle
         reloads (OTA update). Body is dark from the very first byte.
         html/body overflow:hidden is CRITICAL — the inner
         .app-container scrolls via .screen-content. Without these,
         Android tries to scroll the body itself behind the fixed
         app shell, and vertical touch drags get "lost". */
      html, body {
        background:#09090E;
        color:#e8e8ee;
        margin:0;
        padding:0;
        height:100%;
        overflow:hidden;
        font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
      }
      #root { background:#09090E; }
      /* Inline updating overlay — rendered IMMEDIATELY when the new
         bundle's HTML loads after an OTA reload. React's UpdatePrompt
         takes over once it mounts. Hidden by default. */
      #ringin-boot-updating {
        position:fixed; top:0; left:0; width:100vw; height:100vh;
        background:rgba(8,8,18,0.96);
        z-index:99999999;
        display:none;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:18px;
        color:#fff;
        font-family:inherit;
      }
      #ringin-boot-updating.show { display:flex; }
      #ringin-boot-updating .logo {
        width:74px; height:74px; border-radius:22px;
        background:linear-gradient(135deg,#39FF14 0%,#00FF7F 100%);
        display:flex; align-items:center; justify-content:center;
        font-size:36px; font-weight:800; color:#062a08;
        box-shadow:0 0 32px rgba(57,255,20,0.55), 0 0 60px rgba(0,255,127,0.3);
        animation:ringinBootPulse 1.4s ease-in-out infinite;
      }
      #ringin-boot-updating .label { font-size:19px; font-weight:700; }
      #ringin-boot-updating .sub { font-size:13px; color:rgba(255,255,255,0.6); margin-top:-10px; }
      #ringin-boot-updating .bar {
        width:230px; height:5px; border-radius:3px;
        background:rgba(255,255,255,0.1); overflow:hidden; position:relative;
      }
      #ringin-boot-updating .bar > span {
        position:absolute; top:0; left:0; height:100%; width:40%;
        background:linear-gradient(90deg,transparent,#39FF14 30%,#00FF7F 70%,transparent);
        border-radius:3px;
        animation:ringinBootSlide 1.2s linear infinite;
      }
      @keyframes ringinBootPulse { 0%,100% { transform:scale(1) } 50% { transform:scale(1.06) } }
      @keyframes ringinBootSlide { 0% { transform:translateX(-100%) } 100% { transform:translateX(700%) } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Boot-time updating overlay. The JS below shows this within the
         very first paint cycle if localStorage 'ringin_just_updated'
         is set — i.e., we're reloading right after an OTA download.
         This covers the GAP between WebView reload and React mounting,
         so the user never sees a blank screen during an update. -->
    <div id="ringin-boot-updating" aria-hidden="true">
      <div class="logo">⬇</div>
      <div class="label">Updating RingIn</div>
      <div class="sub">Finishing up…</div>
      <div class="bar"><span></span></div>
    </div>
    <script>
      (function(){
        try {
          if (localStorage.getItem('ringin_just_updated') === '1') {
            var el = document.getElementById('ringin-boot-updating');
            if (el) el.classList.add('show');
            // Expose a hide() helper so React can dismiss the overlay
            // once the app is fully mounted and ready.
            window.__ringinHideBootUpdating = function(){
              try {
                var el2 = document.getElementById('ringin-boot-updating');
                if (!el2) return;
                el2.style.transition = 'opacity 380ms ease-out';
                el2.style.opacity = '0';
                setTimeout(function(){ el2.classList.remove('show'); el2.style.opacity=''; el2.style.transition=''; }, 420);
              } catch(_){}
            };
            // SAFETY NET — if React never mounts (build failure) or
            // the hide helper isn't called for any reason, force the
            // overlay off after 6 seconds. Without this, a failed
            // update could leave the boot overlay covering the screen
            // and blocking all touches forever.
            setTimeout(function(){
              try {
                var el3 = document.getElementById('ringin-boot-updating');
                if (el3 && el3.classList.contains('show')) {
                  el3.classList.remove('show');
                }
                localStorage.removeItem('ringin_just_updated');
              } catch(_){}
            }, 6000);
          }
        } catch(e){}
      })();
    </script>
    <!-- ── Early PWA install-prompt capture ─────────────────────────────
         Chromium can fire `beforeinstallprompt` BEFORE React mounts (the
         event fires the moment the SW activates + engagement heuristics
         trigger, which on a fast device can beat React's hydration). If
         our React listener isn't attached yet, the event is lost forever
         and we never get a chance to show the install pill. This tiny
         script attaches a listener at HTML parse time so we can't miss
         it, then stashes the event on window for the React component
         to pick up. -->
    <script>
      (function () {
        try {
          window.__ringinDeferredInstall = null;
          window.addEventListener('beforeinstallprompt', function (e) {
            try { e.preventDefault(); } catch (_) {}
            window.__ringinDeferredInstall = e;
            // Notify React in case the component is already mounted
            try { window.dispatchEvent(new Event('ringin-install-ready')); } catch (_) {}
          });
          window.addEventListener('appinstalled', function () {
            window.__ringinDeferredInstall = null;
            try { window.dispatchEvent(new Event('ringin-install-done')); } catch (_) {}
          });
        } catch (e) { /* never break the page */ }
      })();
    </script>
    <!-- Mobile debug console (Eruda). Loads only when URL has ?debug=1
         Open ring-in.vercel.app/?debug=1 to enable.  Tap the floating button on screen,
         then go to the Console tab — you'll see all [ringin] logs right on your phone. -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          if (p.get('debug') === '1' || localStorage.getItem('ringin_debug') === '1') {
            localStorage.setItem('ringin_debug', '1');
            var s = document.createElement('script');
            s.src = '//cdn.jsdelivr.net/npm/eruda';
            s.onload = function () { try { window.eruda && window.eruda.init(); } catch (e) {} };
            document.body.appendChild(s);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>

      If you open it directly in the browser, you will see an empty page.

    -->
  </body>
</html>
